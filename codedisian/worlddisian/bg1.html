/* Animation for floating/bouncing pets */
@keyframes float {
    0%, 100% {
        transform: translateY(0) rotate(0deg);
        } 50% {
        transform: translateY(-20px) rotate(5deg);
        }
    }
@keyframes bounce-trampoline {
    0%, 100% {
        transform: translateY(0) scale(1);
        } 50% {
        transform: translateY(-150px) scale(1.1);
        }
    }
.pet-floating {
    animation: float 3s ease-in-out infinite
    }
.pet-bouncing {
    animation: bounce-trampoline 2s ease-in-out infinite
    }
/* Glassmorphism for UI elements */
.glass-panel {
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255, 255, 255, 0.6);
    border-radius: 1.5rem
    }
/* Custom pink button style to match original UI */
.ui-btn-pink {
    background: linear-gradient(180deg, #ff79c6 0%, #bd93f9 100%);
    border: 3px solid #fff;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s
    }
