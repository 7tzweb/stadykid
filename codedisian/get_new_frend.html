<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;family=Noto+Sans+Hebrew:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9942f0",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "Noto Sans Hebrew", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', 'Noto Sans Hebrew', sans-serif;
        }
        .sparkle-bg {
            background-image: radial-gradient(circle at 20% 30%, rgba(153, 66, 240, 0.1) 0%, transparent 20%),
                              radial-gradient(circle at 80% 70%, rgba(153, 66, 240, 0.1) 0%, transparent 20%),
                              radial-gradient(circle at 50% 50%, rgba(153, 66, 240, 0.05) 0%, transparent 50%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen overflow-x-hidden">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden sparkle-bg">
<div class="layout-container flex h-full grow flex-col">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 md:px-40">
<div class="flex items-center gap-4 text-primary">
<div class="size-8 bg-primary/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary">pets</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">משחק חיות מחמד</h2>
</div>
<div class="flex gap-3">
<button class="flex size-10 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex size-10 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<main class="layout-content-container flex flex-col max-w-[960px] flex-1 mx-auto w-full px-4 py-8">
<!-- Success Message -->
<div class="text-center mb-6">
<div class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-yellow-400/20 text-yellow-700 dark:text-yellow-400 mb-4 font-bold text-sm">
<span class="material-symbols-outlined text-sm">auto_awesome</span>
                    הצלחה!
                    <span class="material-symbols-outlined text-sm">auto_awesome</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-light text-4xl md:text-5xl font-bold leading-tight mb-2">איזה כיף! קיבלת גור חדש</h1>
<p class="text-primary font-medium text-lg">ברכות! זכית בחבר חדש!</p>
</div>
<!-- Main Reveal Area -->
<div class="relative @container mb-8">
<div class="@[480px]:px-4 @[480px]:py-3 relative">
<!-- Confetti Layer (Symbolic) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden flex justify-around items-start opacity-40">
<span class="material-symbols-outlined text-primary text-4xl mt-10">celebration</span>
<span class="material-symbols-outlined text-yellow-400 text-3xl mt-20">star</span>
<span class="material-symbols-outlined text-blue-400 text-4xl mt-5">favorite</span>
<span class="material-symbols-outlined text-primary text-3xl mt-32">colors_spark</span>
<span class="material-symbols-outlined text-pink-400 text-5xl mt-12">auto_awesome</span>
</div>
<!-- Pet Reveal Visual -->
<div class="w-full bg-gradient-to-b from-primary/5 to-primary/20 flex flex-col items-center justify-center overflow-hidden rounded-xl min-h-[400px] shadow-inner relative border-4 border-white dark:border-slate-800">
<!-- Magical Sparkling Egg / Pet reveal placeholder -->
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl animate-pulse"></div>
<img alt="Ultra cute fluffy purple pet hatching from a magical sparkling egg" class="w-full h-full object-contain relative z-10" data-alt="Ultra cute fluffy purple pet hatching from a magical sparkling egg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBptWulTM0bkqP6YpgNlr88Ucmsv3FohqWfnTVCnVdZCWb7X7QC_SvvhuSzb_mbjvclYatQxFR880oMzFCFf7Ax4sncZ5tFu8xMGvwsoRKdfM1kCnGA-XoNN-mMjHh69IKepZq_pBQEH5xeu8-18acmHXUhktcTdJTz_aLAAKuoBcIJPnZKAA62vRQcNs4JvmFe3QE3empvs4DhfqdC7L542t63POzpxOvi1JhD5jnJQB8WBTQmzezQtxJ4aKk8_tlhZP4fZf5XsjI"/>
</div>
<!-- Floating elements around pet -->
<div class="absolute bottom-8 left-10 md:left-20">
<span class="material-symbols-outlined text-yellow-400 text-4xl animate-bounce">star</span>
</div>
<div class="absolute top-10 right-10 md:right-20">
<span class="material-symbols-outlined text-primary/40 text-6xl">flare</span>
</div>
</div>
</div>
</div>
<!-- Progress Stats -->
<div class="grid grid-cols-2 gap-4 max-w-md mx-auto mb-10">
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm flex items-center gap-4 border border-primary/5">
<div class="size-12 rounded-full bg-yellow-400/20 flex items-center justify-center text-yellow-600">
<span class="material-symbols-outlined text-3xl font-bold">monetization_on</span>
</div>
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">מטבעות</p>
<p class="text-slate-900 dark:text-slate-100 text-xl font-black">+ 500</p>
</div>
</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm flex items-center gap-4 border border-primary/5">
<div class="size-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl font-bold">military_tech</span>
</div>
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">ניסיון XP</p>
<p class="text-slate-900 dark:text-slate-100 text-xl font-black">+ 1,200</p>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="flex px-4 py-3 justify-center mb-10">
<button class="group flex min-w-[240px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-10 bg-primary text-white text-xl font-black leading-normal tracking-[0.015em] shadow-lg shadow-primary/40 hover:scale-105 active:scale-95 transition-all">
<span class="truncate ml-2">המשך</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-[-4px]">arrow_back</span>
</button>
</div>
<!-- Footer Stats Info -->
<div class="mt-auto pt-8 border-t border-primary/10">
<div class="flex flex-col items-center gap-2">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">התקדמות לשלב הבא</p>
<div class="w-full max-w-sm h-3 bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[75%] rounded-full shadow-[0_0_8px_rgba(153,66,240,0.5)]"></div>
</div>
<p class="text-primary font-bold text-xs">750 / 1000 XP</p>
</div>
</div>
</main>
</div>
</div>
</body></html>
